version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: minty
      POSTGRES_PASSWORD: minty_password
      POSTGRES_DB: minti_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minty -d minti_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: minti_db
      POSTGRES_USER: minty
      POSTGRES_PASSWORD: minty_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-django-insecure-replace-in-production}"
      DEBUG: "${DEBUG:-False}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost 127.0.0.1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID:-}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             gunicorn minti.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

volumes:
  postgres_data:
